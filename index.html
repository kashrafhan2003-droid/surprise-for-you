<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only For You ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="loader">
    <h2>A Small Surprise</h2>
    <p>Just For You 💖</p>
    <div class="loader-heart">❤️</div>
</div>

    <!-- Floating Hearts -->
    <div id="hearts"></div>

    <!-- Main Card -->
    <div class="card">

<div id="proposal">

    <h1>💖 WILL U GO ON A DATE WITH ME? 💖</h1>

    <p class="line1">
        I HAVE SOMETHING SPECIAL GIFT FOR YOU... 🌸
    </p>

    <div class="buttons">
        <button id="yesBtn">💖 Yes</button>
        <button id="noBtn">🙈 No</button>
    </div>

</div>

<div id="mainCard" style="display:none;">

        <h1>❤️ FARU ❤️</h1>

        <p class="line1">
            THIS IS FOR YOU...
        </p>

        <button id="playBtn">
            Click Here 💕
        </button>

        <p id="playbtn">
            close your eyes and feel
        </p>

        <audio id="song">
            <source src="song.mp3" type="audio/mpeg">
        </audio>

<p id="surprise">
✨ Thank you for opening this little surprise. I hope it brings a smile to your face. 🌸
</p>

    </div>

    <script src="script.js"></script>

</body>
</html>
